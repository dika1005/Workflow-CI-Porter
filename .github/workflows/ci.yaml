name: Machine Learning Workflow CI

on:
  push:
    branches: [ main ]

jobs:
  retrain-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 scikit-learn pandas numpy

    - name: Run MLflow Project Re-training
      run: |
        mlflow run MLProject --entry-point main --env-manager local

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Build Docker Image via MLflow
      run: |
        # Mengambil RUN_ID dari eksperimen lokal terakhir yang baru saja sukses dieksekusi
        LATEST_RUN=$(python -c "import mlflow; print(mlflow.search_runs()['run_id'][0])")
        echo "Menggunakan Run ID terbaru: $LATEST_RUN"
        
        # Build docker menggunakan base image Python 3.12 resmi agar terbebas dari crash instalasi get-pip
        mlflow models build-docker -m "runs:/$LATEST_RUN/model" -n "${{ secrets.DOCKER_HUB_USERNAME }}/porter-delivery-model:latest" --base-image python:3.12-slim --env-manager local

    - name: Push Image to Docker Hub
      run: |
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/porter-delivery-model:latest